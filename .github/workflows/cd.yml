name: CD

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - ".github/workflows/cd.yml"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build & push Docker images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: api
            context: apps/api
            image: knowledge-product-studio-api
          - service: web
            context: apps/web
            image: knowledge-product-studio-web
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploying requires cluster credentials this repo doesn't have configured
  # (KUBE_CONFIG secret, cluster context, etc). Wire that up, then replace this
  # with `kubectl apply -k k8s/` and a rollout-status check, image tag bump via
  # `kubectl set image` or a GitOps tool (Argo CD / Flux) watching this repo.
  deploy:
    name: Deploy (placeholder)
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Not yet wired up
        run: |
          echo "Images pushed to ghcr.io. Add cluster credentials and a kubectl/Argo CD/Flux step here to deploy."
