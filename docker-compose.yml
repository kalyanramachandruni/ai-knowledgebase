services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: kps
      POSTGRES_PASSWORD: kps
      POSTGRES_DB: knowledge_product_studio
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docs/db_schema.sql:/docker-entrypoint-initdb.d/01-schema.sql

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  opensearch:
    image: opensearchproject/opensearch:2.17.0
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      # Required since OpenSearch 2.12 even with the security plugin disabled —
      # the demo-config installer refuses to start without it. Local dev only;
      # never reuse this value anywhere real auth matters.
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=ChangeMe_Local123!
    ports:
      - "9200:9200"

  api:
    build: ./apps/api
    env_file: .env
    depends_on:
      - postgres
      - redis
      - opensearch
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api/app:/app/app

  web:
    build: ./apps/web
    env_file: .env
    depends_on:
      - api
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.111.0
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317" # OTLP gRPC, matches OTEL_EXPORTER_OTLP_ENDPOINT in .env.example

  prometheus:
    image: prom/prometheus:v2.55.1
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - api

  grafana:
    image: grafana/grafana:11.3.0
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ./observability/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
    ports:
      - "3001:3000" # 3000 is taken by web
    depends_on:
      - prometheus

volumes:
  pgdata:
