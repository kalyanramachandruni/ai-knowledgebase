version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: kps
      POSTGRES_PASSWORD: kps
      POSTGRES_DB: knowledge_product_studio
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docs/db_schema.sql:/docker-entrypoint-initdb.d/01-schema.sql

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  opensearch:
    image: opensearchproject/opensearch:2.17.0
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"

  api:
    build: ./apps/api
    env_file: .env
    depends_on:
      - postgres
      - redis
      - opensearch
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api/app:/app/app

  web:
    build: ./apps/web
    env_file: .env
    depends_on:
      - api
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app

volumes:
  pgdata:
