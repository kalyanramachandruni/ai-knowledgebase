apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kps-ingress
  namespace: knowledge-product-studio
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - knowledge-product-studio.example.com
        - api.knowledge-product-studio.example.com
      secretName: kps-tls
  rules:
    - host: knowledge-product-studio.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service: { name: web, port: { number: 3000 } }
    - host: api.knowledge-product-studio.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service: { name: api, port: { number: 8000 } }
