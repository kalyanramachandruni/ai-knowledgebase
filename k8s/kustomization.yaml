apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: knowledge-product-studio

resources:
  - 00-namespace.yaml
  - 01-configmap.yaml
  - 02-secret.yaml
  - 10-postgres.yaml
  - 11-migration-job.yaml
  - 12-redis.yaml
  - 20-api.yaml
  - 21-web.yaml
  - 30-ingress.yaml

# db-schema ConfigMap is NOT generated here: kustomize's file-source security
# sandbox refuses to read files outside this directory (../docs/db_schema.sql),
# and copying the schema into k8s/ would create a second source of truth that
# drifts from docs/db_schema.sql. Create it manually instead — see the
# kubectl create configmap command documented at the top of 11-migration-job.yaml.

