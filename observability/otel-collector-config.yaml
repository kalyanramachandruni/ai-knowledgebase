receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  batch: {}

exporters:
  # Traces land in the collector's own debug log for MVP. Swap this for an
  # otlp exporter pointed at Tempo/Jaeger/your APM vendor once one is chosen —
  # the API only needs to know the collector's address, never the backend.
  debug:
    verbosity: detailed

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
